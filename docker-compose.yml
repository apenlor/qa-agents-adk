services:
  openproject:
    image: openproject/openproject:16
    container_name: openproject
    ports:
      - "8080:80"
    environment:
      - OPENPROJECT_HOST__NAME=localhost:8080
      - OPENPROJECT_SECRET_KEY_BASE=openprojectkey
      - OPENPROJECT_HTTPS=false
      - OPENPROJECT_HSTS=false
    volumes:
      - op_pgdata:/var/openproject/pgdata
      - op_assets:/var/openproject/assets
    networks:
      - qe-agents-network
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health_checks/default" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  openproject-proxy:
    image: nginx:latest
    container_name: openproject-proxy
    volumes:
      - ./openproject-mcp/proxy/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      openproject:
        condition: service_started
    networks:
      - qe-agents-network
    restart: on-failure

  openproject-mcp:
    build:
      context: ./openproject-mcp
      dockerfile: Dockerfile
    container_name: openproject-mcp
    env_file:
      - ./openproject-mcp/.env
    ports:
      - "8000:8000"
    depends_on:
      openproject:
        condition: service_healthy
    networks:
      - qe-agents-network
    restart: on-failure

  analysis-agent:
    build:
      context: ./analysis-agent
      dockerfile: Dockerfile
    container_name: analysis-agent
    env_file:
      - ./analysis-agent/.env
    ports:
      - "8081:8081"
    depends_on:
      openproject-mcp:
        condition: service_started
    networks:
      - qe-agents-network
    restart: on-failure

volumes:
  op_pgdata:
  op_assets:
networks:
  qe-agents-network:
    driver: bridge